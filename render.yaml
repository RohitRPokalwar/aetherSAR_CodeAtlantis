# Render Blueprint for Full-Stack AetherSAR
# See https://render.com/docs/blueprints for details

services:
  # Backend FastAPI Service
  - type: web
    name: aethersar-backend
    env: python
    buildCommand: pip install -r requirements.txt && pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: USE_GPU
        value: 0  # Render free tier doesn't have GPUs
      - key: GEMINI_API_KEY
        sync: false # Set this manually in Render dashboard

  # Frontend Static Site
  - type: web
    name: aethersar-frontend
    runtime: static
    buildCommand: cd Frontend && npm install && npm run build
    staticPublishPath: Frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: aethersar-backend
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: http://aethersar-backend:8000/api/* # Internal routing or external URL
